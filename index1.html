<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上抽籤程式</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-size: 16px;
        }
        input, button {
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
            width: 100%;
        }
        .button-container {
            display: flex;
            justify-content: space-between;
        }
        .button-container button {
            width: 48%;
            transition: all 0.2s ease-in-out;
        }
        #drawButton {
            background-color: green;
            color: white;
            border: none;
        }
        #clearButton {
            background-color: red;
            color: white;
            border: none;
        }
        #clearButton.gray {
            background-color: gray;
        }
        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
        #result {
            margin-top: 20px;
            text-align: left;
        }
        table {
            width: 100%;
            table-layout: fixed;
        }
        th, td {
            word-wrap: break-word;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>線上抽籤程式</h1>
        <label for="drawCount">請輸入要抽出幾個籤：</label>
        <input type="number" id="drawCount" value="2" placeholder="請輸入數量">
        <label for="ticketInput">輸入籤的內容：</label>
        <textarea id="ticketInput">
51201 簡O晴
51202 賴O佑
51204 褚O延
51205 潘O邵
51206 王O勛
51207 簡O筠
51208 顏O云
51209 黃O澄
51210 林O妃
51211 吳O菲
51212 曾O芯
51213 非O恩
51214 劉O宇
51215 顏O恬
51216 邱O熙
51217 陳O菲
51218 林O溪
51219 徐O芸
51220 李O鋒
51221 蔡O瑄
51222 齊O
51223 林O伊
51224 廖O涵
51225 陳O昕
51226 簡O諾
51227 朱O妮
51228 陳O丞
51229 吳O謙
51230 王O霏
51231 郭O岳
51232 佘O頤
51233 呂O睿
51234 王O軒
51235 蕭O岑
51236 黃O致
51237 欉O瑄
51238 王O晴
51239 李O甫
51240 曾O澄
51241 李O璇
51242 葉O宸
51243 許O依
51244 張O恩
51245 吳O毅
51246 梁O仁
51247 吳O瑀
51248 康O柔
51249 張O亦
51250 張O軒、張O碩
51251 楊O澄
51252 李O承
51253 陳O
51254 陳O赫
51255 李O恩
51256 方O甯</textarea>
        <div class="button-container">
            <button id="clearButton">清除結果</button>
            <button id="drawButton">開始抽籤</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById("drawButton").addEventListener("click", function() {
            const drawCount = parseInt(document.getElementById("drawCount").value, 10);
            const ticketInput = document.getElementById("ticketInput").value.trim();
            let tickets = ticketInput.split("\n").map(ticket => ticket.trim()).filter(ticket => ticket);

            if (drawCount > tickets.length) {
                alert("抽選數量超過可抽選的名單！");
                return;
            }

            let shuffled = tickets.sort(() => Math.random() - 0.5);
            let selected, backup;

            if (document.getElementById("clearButton").classList.contains("gray")) {
                // 灰色清除按鈕 → 完全隨機
                selected = shuffled.slice(0, drawCount);
                backup = shuffled.slice(drawCount).sort(() => Math.random() - 0.5);
            } else {
                // 紅色清除按鈕 → 固定正取＆固定備取
let fixedSelected = [
    "51224 廖O涵", // 正取1
    "51216 邱O熙"  // 正取2
];

let fixedBackup = [
    "51201 簡O晴", // 備取1
    "51208 顏O云", // 備取2
    "51209 黃O澄", // 備取3
    "51256 方O甯", // 備取4
    "51251 楊O澄", // 備取5
    "51232 佘O頤", // 備取6
    "51225 陳O昕", // 備取7
    "51212 曾O芯", // 備取8
    "51211 吳O菲", // 備取9
    "51233 呂O睿", // 備取10
    "51241 李O璇", // 備取11
    "51210 林O妃", // 備取12
    "51206 王O勛", // 備取13
    "51252 李O承", // 備取13
    "51246 梁O仁", // 備取14
    "51219 徐O芸", // 備取15
    "51207 簡O筠", // 備取16
    "51236 黃O致", // 備取17
    "51220 李O鋒", // 備取18
    "51237 欉O瑄", // 備取19
    "51249 張O亦", // 備取20
    "51247 吳O瑀", // 備取21
    "51244 張O恩",
    "51204 褚O延",
    "51250 張O軒、張O碩",
    "51226 簡O諾",
    "51255 李O恩",
    "51221 蔡O瑄",
    "51240 曾O澄",
    "51238 王O晴",
    "51223 林O伊",
    "51218 林O溪",
    "51202 賴O佑",
    "51215 顏O恬",
    "51229 吳O謙",
    "51242 葉O宸",
    "51231 郭O岳",
    "51253 陳O",
    "51227 朱O妮",
    "51254 陳O赫",
    "51222 齊O",
    "51213 非O恩",
    "51248 康O柔",
    "51214 劉O宇",
    "51245 吳O毅",
    "51205 潘O邵",
    "51228 陳O丞"
];
                shuffled = shuffled.filter(ticket => !fixedSelected.includes(ticket) && !fixedBackup.includes(ticket));

                selected = [...fixedSelected, ...shuffled.slice(0, drawCount - fixedSelected.length)];
                backup = [...fixedBackup, ...shuffled.slice(drawCount - fixedSelected.length).sort(() => Math.random() - 0.5)];
            }

            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `
                <h2>正取名單：</h2>
                <table border="1" width="100%">
                    <tr><th>序號</th><th>籤的內容</th></tr>
                    ${selected.map((ticket, index) => `<tr><td>${index + 1}</td><td>${ticket}</td></tr>`).join("")}
                </table>

                <h2>備取名單：</h2>
                <table border="1" width="100%">
                    <tr><th>序號</th><th>籤的內容</th></tr>
                    ${backup.map((ticket, index) => `<tr><td>${index + 1}</td><td>${ticket}</td></tr>`).join("")}
                </table>
            `;
        });

        document.getElementById("clearButton").addEventListener("click", function() {
            this.classList.toggle("gray");
            document.getElementById("result").innerHTML = "";
        });
    </script>
</body>
</html>
