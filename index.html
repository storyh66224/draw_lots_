<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上抽籤程式</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
        }
        textarea {
            width: 100%;
            height: 300px;
            font-size: 16px;
        }
        input, button {
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
            width: 100%;
        }
        .button-container {
            display: flex;
            justify-content: space-between;
        }
        .button-container button {
            width: 48%;
            transition: all 0.2s ease-in-out;
        }
        #drawButton {
            background-color: green;
            color: white;
            border: none;
        }
        #clearButton {
            background-color: red;
            color: white;
            border: none;
        }
        #clearButton.gray {
            background-color: gray;
        }
        button:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
        #result {
            margin-top: 20px;
            text-align: left;
        }
        table {
            width: 100%;
            table-layout: fixed;
        }
        th, td {
            word-wrap: break-word;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>線上抽籤程式</h1>
        <label for="drawCount">請輸入要抽出幾個籤：</label>
        <input type="number" id="drawCount" min="1" value="1" placeholder="請輸入數量">
        <label for="ticketInput">輸入籤的內容：</label>
        <textarea id="ticketInput"></textarea>
        <div class="button-container">
            <button id="clearButton">清除結果</button>
            <button id="drawButton">開始抽籤</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById("drawButton").addEventListener("click", function() {
            const drawCount = parseInt(document.getElementById("drawCount").value, 10);
            const ticketInput = document.getElementById("ticketInput").value.trim();
            let tickets = ticketInput.split("\n").map(ticket => ticket.trim()).filter(ticket => ticket);

            if (drawCount > tickets.length) {
                alert("抽選數量超過可抽選的名單！");
                return;
            }

            let shuffled = tickets.sort(() => Math.random() - 0.5);

            let selected = shuffled.slice(0, drawCount);
            let backup = shuffled.slice(drawCount).sort(() => Math.random() - 0.5);

            let resultDiv = document.getElementById("result");
            resultDiv.innerHTML = `
                <h2>正取名單：</h2>
                <table border="1" width="100%">
                    <tr><th>序號</th><th>籤的內容</th></tr>
                    ${selected.map((ticket, index) => `<tr><td>${index + 1}</td><td>${ticket}</td></tr>`).join("")}
                </table>

                <h2>備取名單：</h2>
                <table border="1" width="100%">
                    <tr><th>序號</th><th>籤的內容</th></tr>
                    ${backup.map((ticket, index) => `<tr><td>${index + 1}</td><td>${ticket}</td></tr>`).join("")}
                </table>
            `;
        });

        document.getElementById("clearButton").addEventListener("click", function() {
            this.classList.toggle("gray");
            document.getElementById("result").innerHTML = "";
        });
    </script>
</body>
</html>
